<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LUNA GROUP — Absensi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0E1220; --panel:#161C31; --panel2:#1C2340; --line:#2A3355;
    --text:#EAEDF8; --dim:#98A1C6; --moon:#F5D98B; --ok:#84DCA8; --bad:#F09090;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--ink); color:var(--text);
    font-family:'Instrument Sans',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100dvh; padding:20px 16px 32px;
  }
  .wrap{ width:100%; max-width:420px; display:flex; flex-direction:column; flex:1; }

  /* Header / clock */
  .brand{ display:flex; align-items:center; justify-content:center; gap:8px;
    letter-spacing:.32em; font-size:12px; font-weight:600; color:var(--dim); }
  .brand svg{ width:16px; height:16px; }
  .clock{
    font-family:'IBM Plex Mono',monospace; font-weight:600;
    font-size:clamp(52px,17vw,72px); text-align:center; margin-top:10px;
    font-variant-numeric:tabular-nums; letter-spacing:-.02em;
  }
  .clock small{ font-size:.42em; color:var(--moon); font-weight:500; }
  .date{ text-align:center; color:var(--dim); font-size:14px; margin-top:2px; }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:18px; margin-top:22px;
  }
  .label{ font-size:12px; letter-spacing:.18em; color:var(--dim); font-weight:600;
    text-transform:uppercase; margin-bottom:12px; }

  /* Name grid */
  .names{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .names button{
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font:inherit; font-weight:500; font-size:16px;
    padding:16px 10px; cursor:pointer;
  }
  .names button:active{ background:var(--line); }
  .empty{ color:var(--dim); font-size:14px; text-align:center; padding:12px 0; }

  /* Action choice */
  .who{ font-family:'Fraunces',serif; font-size:26px; text-align:center; margin-bottom:14px; }
  .actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .actions button{
    border:none; border-radius:12px; font:inherit; font-weight:600; font-size:17px;
    padding:20px 10px; cursor:pointer; color:#101426;
  }
  .btn-in{ background:var(--moon); }
  .btn-out{ background:#AFC0F2; }

  /* Keypad */
  .slots{ display:flex; justify-content:center; gap:12px; margin:6px 0 18px; }
  .slot{
    width:52px; height:64px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel2); display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:30px; font-weight:600;
  }
  .slot.filled{ border-color:var(--moon); }
  .pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pad button{
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:500;
    padding:16px 0; cursor:pointer;
  }
  .pad button:active{ background:var(--line); }
  .pad .fn{ font-family:'Instrument Sans',sans-serif; font-size:14px; color:var(--dim); }
  .confirm{
    width:100%; margin-top:14px; border:none; border-radius:12px;
    background:var(--moon); color:#101426; font:inherit; font-weight:600; font-size:17px;
    padding:16px; cursor:pointer;
  }
  .confirm:disabled{ opacity:.35; }

  /* Result */
  .result{ text-align:center; padding:14px 0 6px; }
  .result .big{ font-family:'Fraunces',serif; font-size:28px; margin-bottom:8px; }
  .result .time{ font-family:'IBM Plex Mono',monospace; font-size:40px; font-weight:600; }
  .result.ok .big{ color:var(--ok); }
  .result.bad .big{ color:var(--bad); font-size:22px; }
  .result p{ color:var(--dim); font-size:15px; margin-top:8px; }

  .back{
    background:none; border:none; color:var(--dim); font:inherit; font-size:14px;
    cursor:pointer; margin-top:16px; width:100%; text-align:center; padding:8px;
  }
  .hidden{ display:none; }
  .foot{ margin-top:auto; padding-top:26px; text-align:center; color:#4A5378; font-size:12px; letter-spacing:.1em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 13.2A8.5 8.5 0 1 1 10.8 4a7 7 0 0 0 9.2 9.2Z" fill="#F5D98B"/></svg>
    LUNA GROUP
  </div>
  <div class="clock" id="clock">--:--<small> WIB</small></div>
  <div class="date" id="date"></div>

  <!-- Step 1: pick name -->
  <div class="card" id="step-name">
    <div class="label">Pilih Namamu</div>
    <div class="names" id="names"><div class="empty">Memuat daftar…</div></div>
  </div>

  <!-- Step 2: pick action -->
  <div class="card hidden" id="step-action">
    <div class="who" id="who"></div>
    <div class="actions">
      <button class="btn-in"  onclick="pickAction('in')">Clock In<br><span style="font-weight:400;font-size:13px">Masuk</span></button>
      <button class="btn-out" onclick="pickAction('out')">Clock Out<br><span style="font-weight:400;font-size:13px">Pulang</span></button>
    </div>
    <button class="back" onclick="reset()">‹ Ganti nama</button>
  </div>

  <!-- Step 3: code -->
  <div class="card hidden" id="step-code">
    <div class="label" id="code-label">Masukkan Kode dari Manajer</div>
    <div class="slots">
      <div class="slot" id="s0"></div><div class="slot" id="s1"></div><div class="slot" id="s2"></div>
    </div>
    <div class="pad">
      <button onclick="key('1')">1</button><button onclick="key('2')">2</button><button onclick="key('3')">3</button>
      <button onclick="key('4')">4</button><button onclick="key('5')">5</button><button onclick="key('6')">6</button>
      <button onclick="key('7')">7</button><button onclick="key('8')">8</button><button onclick="key('9')">9</button>
      <button class="fn" onclick="clearCode()">Hapus</button><button onclick="key('0')">0</button><button class="fn" onclick="backspace()">⌫</button>
    </div>
    <button class="confirm" id="confirm" disabled onclick="submitClock()">Konfirmasi</button>
    <button class="back" onclick="toAction()">‹ Kembali</button>
  </div>

  <!-- Step 4: result -->
  <div class="card hidden" id="step-result">
    <div class="result" id="result"></div>
    <button class="back" onclick="reset()">Selesai</button>
  </div>

  <div class="foot">ABSENSI KARYAWAN · LUNA GROUP</div>
</div>

<script>
/* ================= KONFIGURASI ================= */
const SUPABASE_URL = "PASTE_PROJECT_URL_DISINI";
const SUPABASE_ANON_KEY = "PASTE_ANON_KEY_DISINI";
/* =============================================== */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = null;   // {id, name}
let action = null;     // 'in' | 'out'
let code = "";
let resetTimer = null;

/* Live clock */
const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
function tick(){
  const now = new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Jakarta"}));
  const hh = String(now.getHours()).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock").innerHTML = `${hh}:${mm}<small> WIB</small>`;
  document.getElementById("date").textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
tick(); setInterval(tick, 5000);

function show(id){
  for (const s of ["step-name","step-action","step-code","step-result"])
    document.getElementById(s).classList.toggle("hidden", s !== id);
}

async function loadNames(){
  const box = document.getElementById("names");
  try{
    const { data, error } = await db.rpc("get_employees");
    if (error) throw error;
    const list = data || [];
    if (!list.length){ box.innerHTML = '<div class="empty">Belum ada karyawan terdaftar.</div>'; return; }
    box.innerHTML = "";
    for (const e of list){
      const b = document.createElement("button");
      b.textContent = e.name;
      b.onclick = () => { selected = e; document.getElementById("who").textContent = e.name; show("step-action"); };
      box.appendChild(b);
    }
  }catch(err){
    box.innerHTML = '<div class="empty">Gagal memuat. Cek koneksi internet, lalu muat ulang halaman.</div>';
  }
}
loadNames();

function pickAction(a){
  action = a; code = ""; renderSlots();
  document.getElementById("code-label").textContent =
    a === "in" ? "Kode Clock In dari Manajer" : "Kode Clock Out dari Manajer";
  show("step-code");
}
function toAction(){ show("step-action"); }

function renderSlots(){
  for (let i = 0; i < 3; i++){
    const s = document.getElementById("s" + i);
    s.textContent = code[i] || "";
    s.classList.toggle("filled", !!code[i]);
  }
  document.getElementById("confirm").disabled = code.length !== 3;
}
function key(d){ if (code.length < 3){ code += d; renderSlots(); } }
function backspace(){ code = code.slice(0, -1); renderSlots(); }
function clearCode(){ code = ""; renderSlots(); }

async function submitClock(){
  const btn = document.getElementById("confirm");
  btn.disabled = true; btn.textContent = "Mengirim…";
  try{
    const { data, error } = await db.rpc("clock_action",
      { p_employee: selected.id, p_code: code, p_action: action });
    if (error) throw error;
    showResult(data);
  }catch(err){
    showResult({ ok:false, msg:"Gagal terhubung ke server. Coba lagi." });
  }finally{
    btn.disabled = false; btn.textContent = "Konfirmasi";
  }
}

function showResult(r){
  const el = document.getElementById("result");
  if (r.ok){
    el.className = "result ok";
    el.innerHTML = `
      <div class="big">${r.action === "in" ? "Berhasil Clock In ✓" : "Berhasil Clock Out ✓"}</div>
      <div class="time">${r.time}</div>
      <p>${r.name} — tercatat. ${r.action === "in" ? "Selamat bekerja!" : "Hati-hati di jalan!"}</p>`;
  }else{
    el.className = "result bad";
    el.innerHTML = `<div class="big">Tidak Tercatat</div><p>${r.msg}</p>`;
  }
  show("step-result");
  clearTimeout(resetTimer);
  resetTimer = setTimeout(reset, 8000);
}

function reset(){
  clearTimeout(resetTimer);
  selected = null; action = null; code = "";
  show("step-name");
}
</script>
</body>
</html>
